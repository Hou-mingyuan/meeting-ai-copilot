name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  python-quality:
    name: Python compile & smoke
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install system audio libs
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libpulse0

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install --no-cache-dir -r requirements.txt

      - name: Compile check
        run: python -m py_compile src/cloud_runtime.py src/cloud_asr_volcengine.py

      - name: Smoke test (no API keys)
        run: python src/cloud_asr_volcengine.py --config config.example.json --smoke-test

      - name: Dependency audit
        run: pip audit --desc
        continue-on-error: true

  docker-smoke:
    name: Docker smoke
    runs-on: ubuntu-latest
    needs: [python-quality]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Docker Compose smoke
        run: docker compose up --build --abort-on-container-exit --exit-code-from meeting-ai-copilot
