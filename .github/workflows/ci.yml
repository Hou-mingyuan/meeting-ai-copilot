name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  python-quality:
    name: Python compile & smoke
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install system audio libs
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libpulse0

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install --no-cache-dir -r requirements.txt -r requirements-dev.txt

      - name: Compile check
        run: python -m py_compile src/cloud_runtime.py src/cloud_asr_volcengine.py src/transcript_question_fsm.py

      - name: Pytest heuristic suite
        run: python -m pytest tests/ -q

      - name: Smoke test (no API keys)
        run: python src/cloud_asr_volcengine.py --config config.example.json --smoke-test

      - name: Mock AI test (builtin, zero key)
        run: python src/cloud_asr_volcengine.py --config config.mock-offline.json --test-ai

      - name: Dependency audit
        run: pip audit --desc
        continue-on-error: true

  docker-smoke:
    name: Docker smoke
    runs-on: ubuntu-latest
    needs: [python-quality]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Docker Compose smoke
        run: docker compose up --build --abort-on-container-exit --exit-code-from meeting-ai-copilot

  loadtest-k6:
    name: Mock loadtest (dry-run + k6 thresholds)
    runs-on: ubuntu-latest
    needs: [python-quality]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Start mock server
        run: |
          python loadtest/mock_server.py --port 8765 &
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:8765/health >/dev/null; then
              echo "Mock server ready"
              exit 0
            fi
            sleep 1
          done
          echo "Mock server failed to start"
          exit 1

      - name: Python dry-run gate
        run: python loadtest/dry_run.py --base-url http://127.0.0.1:8765 --iterations 20 --concurrency 4

      - name: Mock demo loop (zero key)
        run: python scripts/demo_mock_loop.py --base-url http://127.0.0.1:8765

      - name: k6 smoke + burst (CI thresholds)
        env:
          MOCK_BASE_URL: http://127.0.0.1:8765
        run: |
          docker run --rm --network host \
            -e MOCK_BASE_URL \
            -v "${{ github.workspace }}/loadtest:/scripts" \
            grafana/k6:latest run /scripts/k6_smoke.js
